<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 통장에 쏙</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f4f7f9;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .frame {
      width: clamp(360px, 100%, 440px);
      min-height: 100vh;
      background: #f4f7f9;
      display: flex;
      flex-direction: column;
      padding-bottom: 24px;
    }

    /* ── 헤더 ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
    }
    .header-back {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; text-decoration: none;
    }
    .header-back svg { width:20px; height:20px; stroke:#000; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .header-title { font-size:18px; font-weight:600; color:#000; letter-spacing:-0.18px; }
    .header-memo  { font-size:14px; font-weight:400; color:#2d91ff; cursor:pointer; letter-spacing:-0.14px; }

    /* ── 날짜 네비게이션 ── */
    .date-nav {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; padding: 0 16px 16px;
    }
    .date-arrow {
      width:24px; height:24px; display:flex; align-items:center; justify-content:center; cursor:pointer;
    }
    .date-arrow svg { width:16px; height:16px; fill:none; stroke:#728094; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .date-box {
      display:flex; align-items:center; gap:6px;
      background:white; border:1px solid #e8edf2; border-radius:8px; padding:6px 14px;
    }
    .date-box span { font-size:14px; font-weight:500; color:#000; letter-spacing:-0.14px; }
    .date-box svg  { width:16px; height:16px; fill:none; stroke:#728094; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }

    /* ── 카드 공통 ── */
    .card {
      background: white; border: 1px solid #e8edf2;
      border-radius: 20px; margin: 0 16px 12px; padding: 20px;
    }

    /* ── 카드 1: 입금 상세 ── */
    .today-label { font-size:12px; font-weight:400; color:#728094; letter-spacing:-0.12px; margin-bottom:4px; }
    .today-title { font-size:18px; font-weight:600; color:#000; letter-spacing:-0.18px; margin-bottom:20px; }

    .amount-row  { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .amount-label { font-size:14px; font-weight:400; color:#728094; letter-spacing:-0.14px; }
    .amount-value { font-size:14px; font-weight:400; color:#000; letter-spacing:-0.14px; }

    .divider { height:1px; background:#e8edf2; margin:14px 0; }

    .total-row  { display:flex; justify-content:space-between; align-items:center; }
    .total-label { font-size:16px; font-weight:600; color:#000; letter-spacing:-0.16px; }
    .total-value { font-size:18px; font-weight:700; color:#2d91ff; letter-spacing:-0.18px; }

    .expand-btn {
      display:flex; align-items:center; justify-content:center; gap:4px;
      margin-top:20px; padding-top:16px; border-top:1px solid #e8edf2;
      cursor:pointer; font-size:14px; font-weight:500; color:#2d91ff; letter-spacing:-0.14px;
      user-select: none;
    }
    .expand-btn svg { width:16px; height:16px; fill:none; stroke:#2d91ff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; transition: transform 0.25s; }
    .expand-btn.open svg { transform: rotate(180deg); }

    /* ── 카드 2: 카드 매출 건별 내역 ── */
    .card2-header { display:flex; justify-content:space-between; align-items:center; }
    .card2-title  { font-size:16px; font-weight:600; color:#000; letter-spacing:-0.16px; }
    .card2-count  { font-size:14px; font-weight:400; color:#728094; letter-spacing:-0.14px; }

    .toggle-btn {
      display:flex; align-items:center; justify-content:center; gap:4px;
      margin-top:0; padding-top:14px; border-top:1px solid #e8edf2;
      cursor:pointer; font-size:14px; font-weight:500; color:#2d91ff; letter-spacing:-0.14px;
      user-select:none;
    }
    .toggle-btn svg { width:16px; height:16px; fill:none; stroke:#2d91ff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; transition:transform 0.25s; }
    .toggle-btn.open svg { transform: rotate(180deg); }

    /* ── 펼쳐보기 콘텐츠 ── */
    .detail-wrap {
      display: none;
      margin-top: 16px;
    }
    .detail-wrap.open { display: block; }

    /* 필터 행 */
    .filter-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .filter-time {
      display: flex; align-items: center; gap: 4px;
      font-size: 14px; font-weight: 500; color: #3e486b;
      border: 1px solid #e8edf2; border-radius: 8px;
      padding: 5px 10px; cursor: pointer; letter-spacing:-0.14px;
    }
    .filter-time svg { width:14px; height:14px; fill:none; stroke:#3e486b; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .filter-waiting {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 400; color: #728094;
      cursor: pointer; letter-spacing:-0.12px;
    }
    .filter-waiting .checkbox {
      width:14px; height:14px; border:1.5px solid #c4cdd6; border-radius:3px;
      display:flex; align-items:center; justify-content:center;
    }

    /* 카드사 탭 */
    .card-tabs {
      display: flex; gap: 8px; flex-wrap: nowrap;
      overflow-x: auto; padding-bottom: 2px; margin-bottom: 16px;
      scrollbar-width: none;
    }
    .card-tabs::-webkit-scrollbar { display: none; }
    .tab-item {
      flex-shrink: 0;
      font-size: 14px; font-weight: 500; color: #728094; letter-spacing:-0.14px;
      padding: 5px 14px; border-radius: 20px; border: 1px solid #e8edf2;
      cursor: pointer; white-space: nowrap; background: white;
    }
    .tab-item.active { color: #2d91ff; border-color: #2d91ff; font-weight: 600; }

    /* 거래 목록 스크롤 영역 */
    .txn-list {
      max-height: 420px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #d0d8e4 transparent;
    }
    .txn-list::-webkit-scrollbar { width: 4px; }
    .txn-list::-webkit-scrollbar-track { background: transparent; }
    .txn-list::-webkit-scrollbar-thumb { background: #d0d8e4; border-radius: 2px; }

    /* 개별 거래 아이템 */
    .txn-item {
      padding: 16px 0;
      border-bottom: 1px solid #f0f4f7;
    }
    .txn-item:last-child { border-bottom: none; }

    .txn-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
    }
    .txn-time {
      font-size: 14px; font-weight: 600; color: #000; letter-spacing:-0.14px; min-width: 38px;
    }
    .card-logo {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: white; flex-shrink: 0;
    }
    .txn-card-name {
      font-size: 14px; font-weight: 600; color: #000; letter-spacing:-0.14px;
    }

    .txn-body { padding-left: 46px; }
    .txn-row  { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
    .txn-label { font-size:13px; font-weight:400; color:#728094; letter-spacing:-0.13px; }
    .txn-value { font-size:13px; font-weight:400; color:#000; letter-spacing:-0.13px; }
    .txn-value.minus { color: #000; }
    .txn-value.fee-note { font-size:11px; color:#a0aab8; }

    .txn-total-row {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom: 8px;
    }
    .txn-total-label { font-size:14px; font-weight:600; color:#000; letter-spacing:-0.14px; }
    .txn-total-value { font-size:14px; font-weight:600; color:#000; letter-spacing:-0.14px; }

    .txn-status {
      display: flex; align-items: center; gap: 6px; margin-bottom: 5px;
    }
    .status-icon { font-size: 14px; }
    .status-text { font-size:13px; font-weight:500; color:#3e486b; letter-spacing:-0.13px; }
    .txn-note { font-size:12px; font-weight:400; color:#a0aab8; letter-spacing:-0.12px; }
  </style>
</head>
<body>
<div class="frame">

  <!-- 헤더 -->
  <div class="header">
    <a class="header-back" href="home.html">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <span class="header-title">내 통장에 쏙</span>
    <span class="header-memo">메모 입력</span>
  </div>

  <!-- 날짜 네비게이션 -->
  <div class="date-nav">
    <div class="date-arrow">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <div class="date-box">
      <span>5월 6일</span>
      <svg viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
    </div>
    <div class="date-arrow" style="transform:rotate(180deg);">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
  </div>

  <!-- 카드 1: 입금 상세 -->
  <div class="card">
    <p class="today-label">Today</p>
    <p class="today-title">오늘 5월 6일 입금 상세</p>

    <div class="amount-row">
      <span class="amount-label">카드 매출액</span>
      <span class="amount-value">2,903,930원</span>
    </div>
    <div class="amount-row">
      <span class="amount-label">차감 수수료</span>
      <span class="amount-value">-9,430원</span>
    </div>

    <div class="divider"></div>

    <div class="total-row">
      <span class="total-label">실제 입금액</span>
      <span class="total-value">2,894,500원</span>
    </div>

    <a href="payment2.html" class="expand-btn" style="text-decoration:none;">
      입금 캘린더
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </a>
  </div>

  <!-- 카드 2: 카드 매출 건별 내역 -->
  <div class="card">
    <div class="card2-header">
      <span class="card2-title">입금 건별 내역</span>
      <span class="card2-count">총 72건</span>
    </div>

    <!-- 펼쳐보기 버튼 -->
    <a href="payment3.html" class="toggle-btn" style="text-decoration:none; margin-top:14px;">
      <span>펼쳐보기</span>
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </a>

  </div><!-- .card -->

</div>

</body>
</html>
