<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미입금액 확인</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#e0e0e0; display:flex; justify-content:center; min-height:100vh; font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif; }
    .frame { width:clamp(360px,100%,440px); background:#f4f7f9; min-height:100vh; }

    .header { background:white; display:flex; align-items:center; padding:14px 16px; border-bottom:1px solid #e8edf2; position:sticky; top:0; z-index:10; }
    .back-btn { background:none; border:none; cursor:pointer; padding:4px; display:flex; align-items:center; }
    .header-title { flex:1; text-align:center; font-size:17px; font-weight:600; color:#1a1a1a; }
    .header-spacer { width:32px; }

    .month-nav { background:white; display:flex; align-items:center; justify-content:center; gap:12px; padding:10px 16px; border-bottom:1px solid #e8edf2; }
    .month-btn { background:none; border:none; cursor:pointer; display:flex; align-items:center; }
    .month-pill { font-size:14px; font-weight:500; color:#3e486b; background:#f0f4f7; border-radius:20px; padding:5px 18px; }

    .steps { display:flex; align-items:flex-start; justify-content:center; padding:14px 16px 10px; background:white; border-bottom:1px solid #e8edf2; }
    .step { display:flex; flex-direction:column; align-items:center; gap:5px; }
    .step-dot { width:10px; height:10px; border-radius:50%; background:#dde3ea; }
    .step-dot.done { background:#2d91ff; }
    .step-dot.active { width:14px; height:14px; background:#2d91ff; }
    .step-label { font-size:10px; color:#aab2bd; white-space:nowrap; }
    .step-label.done { color:#2d91ff; }
    .step-label.active { color:#2d91ff; font-weight:700; }
    .step-line { width:36px; height:2px; background:#dde3ea; margin-top:6px; }
    .step-line.done { background:#2d91ff; }

    .content { padding:14px; display:flex; flex-direction:column; gap:12px; }

    .scan-card { background:white; border-radius:16px; padding:16px; display:flex; align-items:center; gap:10px; }
    .scan-text { font-size:14px; color:#3e486b; font-weight:500; }

    .alert-badge { background:#FFB800; border-radius:16px; padding:16px 20px; display:flex; align-items:center; gap:12px; justify-content:center; }
    .alert-badge-text { font-size:20px; font-weight:800; color:white; }

    .detail-card { background:white; border-radius:16px; padding:16px; }
    .detail-row { display:flex; padding:7px 0; border-bottom:1px solid #f0f4f7; align-items:center; }
    .detail-row:last-child { border-bottom:none; }
    .detail-label { font-size:13px; color:#728094; width:86px; flex-shrink:0; }
    .detail-value { font-size:13px; color:#1a1a1a; font-weight:500; flex:1; }
    .detail-late { font-size:11px; color:#ff4d4f; background:#fff0f0; border-radius:6px; padding:2px 8px; margin-left:8px; display:flex; align-items:center; gap:3px; }

    .reason-box { background:#fff7df; border-radius:12px; padding:12px 14px; }
    .reason-text { font-size:13px; color:#b07a00; font-weight:600; }
    .reason-confirm { font-size:13px; color:#e07b00; font-weight:600; text-align:center; margin-top:6px; }

    .btn-wrap { display:flex; flex-direction:column; gap:10px; }
    .btn-primary { background:#2d91ff; color:white; border:none; border-radius:14px; padding:15px; width:100%; font-size:16px; font-weight:700; font-family:inherit; cursor:pointer; text-align:center; display:block; text-decoration:none; }
    .btn-secondary { background:white; color:#3e486b; border:1.5px solid #dde3ea; border-radius:14px; padding:15px; width:100%; font-size:15px; font-weight:600; font-family:inherit; cursor:pointer; text-align:center; }
    .btn-sub { font-size:11px; color:#a0aab6; text-align:right; margin-top:3px; }

    .jeonsan-box { background:#fff9e6; border-radius:16px; padding:14px 16px; }
    .jeonsan-tag { font-size:11px; color:#e08a00; background:#ffe9a0; border-radius:20px; padding:2px 10px; display:inline-block; margin-bottom:8px; }
    .jeonsan-text { font-size:13px; color:#3e486b; margin-bottom:10px; font-weight:600; }
    .btn-jeonsan { background:white; border:1.5px solid #FFB800; border-radius:10px; padding:12px; width:100%; font-size:14px; font-weight:700; color:#e08a00; font-family:inherit; cursor:pointer; text-align:center; display:block; text-decoration:none; }
  </style>
</head>
<body>
<div class="frame">
  <div class="header">
    <button class="back-btn" onclick="history.back()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#3e486b"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    </button>
    <div class="header-title">미입금액 확인</div>
    <div class="header-spacer"></div>
  </div>

  <div class="month-nav">
    <button class="month-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#728094"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    </button>
    <div class="month-pill">26년 5월</div>
    <button class="month-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#728094"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
    </button>
  </div>

  <div class="steps">
    <div class="step">
      <div class="step-dot done"></div>
      <div class="step-label done">탐색시작</div>
    </div>
    <div class="step-line done"></div>
    <div class="step">
      <div class="step-dot active"></div>
      <div class="step-label active">이상발견!</div>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-dot"></div>
      <div class="step-label">신고접수</div>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-dot"></div>
      <div class="step-label">입금완료</div>
    </div>
  </div>

  <div class="content">

    <div class="scan-card">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#728094" style="flex-shrink:0;"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <div class="scan-text">입금현황에 이상이 없는지 확인하고 있어요!</div>
    </div>

    <div class="alert-badge">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
      <div class="alert-badge-text">누락 의심 !&nbsp; "1건"</div>
    </div>

    <div class="detail-card">
      <div class="detail-row">
        <div class="detail-label">결제일 :</div>
        <div class="detail-value">5월 3일 오후 2시 30분</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">내역 :</div>
        <div class="detail-value">50,000원 (KB국민카드)</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">승인번호 :</div>
        <div class="detail-value">12345678</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">입금 예정일 :</div>
        <div class="detail-value">5월 6일</div>
        <div class="detail-late">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="#ff4d4f"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
          1일 초과됨
        </div>
      </div>
    </div>

    <div class="reason-box">
      <div class="reason-text">예상 지연 이유 : "중복 결제로 인한 매입보류"</div>
      <div class="reason-confirm" style="font-size:12px;color:#a07000;margin-top:6px;">"미매입" 건으로 확인 되었어요</div>
    </div>

    <div class="btn-wrap">
      <div>
        <a href="missing2-1.html" class="btn-primary">카드사로 증빙 전송</a>
        <div class="btn-sub">전표내역이 자동 발송돼요</div>
      </div>
      <div>
        <button class="btn-secondary">하루 더 기다려 볼게요</button>
        <div class="btn-sub">내일 다시 알려줘요</div>
      </div>
    </div>

    <div class="jeonsan-box">
      <div class="jeonsan-tag">연휴 전 조기입금으로!</div>
      <div class="jeonsan-text">캐시노트가 먼저 입금해드릴까요?</div>
      <button class="btn-jeonsan">선정산 신청하기</button>
    </div>

  </div>
</div>
</body>
</html>
