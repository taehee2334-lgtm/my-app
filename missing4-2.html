<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미입금액 확인</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#e0e0e0; display:flex; justify-content:center; min-height:100vh; font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif; }
    .frame { width:clamp(360px,100%,440px); background:#f4f7f9; min-height:100vh; }
    .header { background:white; display:flex; align-items:center; padding:14px 16px; border-bottom:1px solid #e8edf2; position:sticky; top:0; z-index:10; }
    .back-btn { background:none; border:none; cursor:pointer; padding:4px; display:flex; align-items:center; }
    .header-title { flex:1; text-align:center; font-size:17px; font-weight:600; color:#1a1a1a; }
    .header-spacer { width:32px; }
    .month-nav { background:white; display:flex; align-items:center; justify-content:center; gap:12px; padding:10px 16px; border-bottom:1px solid #e8edf2; }
    .month-btn { background:none; border:none; cursor:pointer; display:flex; align-items:center; }
    .month-pill { font-size:14px; font-weight:500; color:#3e486b; background:#f0f4f7; border-radius:20px; padding:5px 18px; }
    .steps { display:flex; align-items:flex-start; justify-content:center; padding:14px 16px 10px; background:white; border-bottom:1px solid #e8edf2; }
    .step { display:flex; flex-direction:column; align-items:center; gap:5px; }
    .step-dot { width:10px; height:10px; border-radius:50%; background:#dde3ea; }
    .step-dot.done { background:#2d91ff; }
    .step-dot.active { width:14px; height:14px; background:#2d91ff; }
    .step-label { font-size:10px; color:#aab2bd; white-space:nowrap; }
    .step-label.done { color:#2d91ff; }
    .step-label.active { color:#2d91ff; font-weight:700; }
    .step-line { width:36px; height:2px; background:#dde3ea; margin-top:6px; }
    .step-line.done { background:#2d91ff; }
    .content { padding:14px; display:flex; flex-direction:column; gap:12px; }
    .change-tag { background:#e8f0ff; border-radius:20px; padding:4px 14px; font-size:12px; color:#2d91ff; font-weight:600; display:inline-block; }
    .section-card { background:white; border-radius:16px; padding:16px; }
    .section-title { font-size:15px; font-weight:700; color:#1a1a1a; margin-bottom:12px; }
    .info-row { display:flex; padding:8px 0; border-bottom:1px solid #f0f4f7; font-size:13px; }
    .info-row:last-child { border-bottom:none; }
    .info-label { color:#728094; width:100px; flex-shrink:0; }
    .info-value { color:#1a1a1a; font-weight:600; }
    .hint-box { background:#fff9e6; border-radius:10px; padding:12px; font-size:12px; color:#728094; line-height:1.6; }
    .action-row { display:flex; justify-content:space-between; align-items:center; }
    .link-text { font-size:13px; color:#728094; cursor:pointer; text-decoration:underline; }
    .btn-call { background:#2d91ff; color:white; border:none; border-radius:10px; padding:11px 18px; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer; display:flex; align-items:center; gap:8px; }
  </style>
</head>
<body>
<div class="frame">
  <div class="header">
    <button class="back-btn" onclick="history.back()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#3e486b"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    </button>
    <div class="header-title">미입금액 확인</div>
    <div class="header-spacer"></div>
  </div>
  <div class="month-nav">
    <button class="month-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="#728094"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg></button>
    <div class="month-pill">26년 5월</div>
    <button class="month-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="#728094"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg></button>
  </div>
  <div class="steps">
    <div class="step"><div class="step-dot done"></div><div class="step-label done">탐색시작</div></div>
    <div class="step-line done"></div>
    <div class="step"><div class="step-dot done"></div><div class="step-label done">이상발견!</div></div>
    <div class="step-line done"></div>
    <div class="step"><div class="step-dot active"></div><div class="step-label active">신고접수</div></div>
    <div class="step-line"></div>
    <div class="step"><div class="step-dot"></div><div class="step-label">입금완료</div></div>
  </div>
  <div class="content">
    <div style="text-align:center;"><span class="change-tag">입금 통장 계좌를 바꿨어요</span></div>
    <div class="section-card">
      <div class="section-title">대리점에 바로 연결할게요</div>
      <div class="info-row"><span class="info-label">사업자 번호는</span><span class="info-value">121-21-12121</span></div>
      <div class="info-row"><span class="info-label">제 영업장의 이름은</span><span class="info-value">내 가게</span></div>
      <div style="font-size:13px; color:#3e486b; margin-top:10px; line-height:1.7;">
        매장의 입금 통장 계좌를 변경했어요<br>
        가맹점 정보 변경을 위한 절차를 안내해주세요
      </div>
      <div style="font-size:12px;color:#728094;margin-top:8px;">통화 연결이 되면 이 내용을 전달해주세요</div>
    </div>
    <div class="hint-box">가맹점 정보 변경의 원인이 아닐 시 세금 압류, 정산 한도 초과 등 카드사 정책에 따른 보류일 수 있으니 [상세 사유] 를 확인해 보세요</div>
    <div class="action-row">
      <span class="link-text">이 정보가 아닌가요?</span>
      <button class="btn-call">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
        저장된 번호로 통화연결
      </button>
    </div>
  </div>
</div>
</body>
</html>
