<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 통장에 쏙 — 입금 캘린더</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#f4f7f9;
      display:flex; justify-content:center;
      font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
    }
    .frame {
      width:clamp(360px,100%,440px);
      min-height:100vh;
      background:#f4f7f9;
      display:flex; flex-direction:column;
      padding-bottom:32px;
    }

    /* HEADER */
    .header {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 16px;
    }
    .header-back {
      width:32px; height:32px;
      display:flex; align-items:center; justify-content:center;
      text-decoration:none;
    }
    .header-back svg { width:20px; height:20px; stroke:#000; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .header-title { font-size:18px; font-weight:600; color:#000; }
    .header-memo  { font-size:14px; font-weight:400; color:#2d91ff; cursor:pointer; }

    /* DATE NAV */
    .date-nav {
      display:flex; align-items:center; justify-content:center;
      gap:12px; padding:0 16px 16px;
    }
    .date-arrow { width:24px; height:24px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .date-arrow svg { width:16px; height:16px; fill:none; stroke:#728094; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .date-box {
      display:flex; align-items:center; gap:6px;
      background:#fff; border:1px solid #e8edf2; border-radius:8px; padding:6px 14px;
    }
    .date-box span { font-size:14px; font-weight:500; color:#000; }
    .date-box svg  { width:16px; height:16px; fill:none; stroke:#728094; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }

    /* CARD */
    .card { background:#fff; border:1px solid #e8edf2; border-radius:20px; margin:0 16px 12px; padding:20px; }

    /* SUMMARY */
    .today-label { font-size:12px; font-weight:400; color:#728094; margin-bottom:4px; }
    .today-title { font-size:18px; font-weight:600; color:#000; margin-bottom:20px; }
    .amount-row  { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .amount-label { font-size:14px; color:#728094; }
    .amount-value { font-size:14px; color:#000; }
    .divider { height:1px; background:#e8edf2; margin:14px 0; }
    .total-row  { display:flex; justify-content:space-between; align-items:center; }
    .total-label { font-size:16px; font-weight:600; color:#000; }
    .total-value { font-size:18px; font-weight:700; color:#2d91ff; }

    /* 입금 캘린더 expanded header */
    .cal-header-btn {
      display:flex; align-items:center; justify-content:center; gap:4px;
      margin-top:20px; padding-top:16px; border-top:1px solid #e8edf2;
      font-size:14px; font-weight:500; color:#2d91ff;
    }
    .cal-header-btn svg { width:16px; height:16px; fill:none; stroke:#2d91ff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; transform:rotate(180deg); }

    /* LEGEND */
    .legend { display:flex; gap:16px; margin:14px 0 16px; }
    .legend-item { display:flex; align-items:center; gap:5px; font-size:12px; color:#728094; }
    .legend-dot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }

    /* CALENDAR GRID */
    .cal-grid { width:100%; border-collapse:collapse; }
    .cal-grid th {
      font-size:12px; font-weight:500; color:#728094;
      text-align:center; padding:6px 2px;
    }
    .cal-grid td {
      text-align:center; padding:4px 2px; vertical-align:top;
      width:calc(100%/7);
    }
    .cal-date { font-size:13px; font-weight:500; color:#000; margin-bottom:2px; }
    .cal-date.today {
      width:24px; height:24px; border-radius:50%;
      background:#2d91ff; color:#fff;
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 2px;
    }
    .cal-amt-blue { font-size:10px; color:#2d91ff; line-height:1.3; }
    .cal-amt-green { font-size:10px; color:#22c55e; line-height:1.3; }
    .cal-empty { padding:4px; }

    /* 입금 건별 내역 섹션 */
    .card2-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .card2-title  { font-size:16px; font-weight:600; color:#000; }
    .card2-count  { font-size:14px; color:#728094; }
    .expand-link {
      display:flex; align-items:center; justify-content:center; gap:4px;
      padding-top:14px; border-top:1px solid #e8edf2;
      font-size:14px; font-weight:500; color:#2d91ff;
      text-decoration:none;
    }
    .expand-link svg { width:16px; height:16px; fill:none; stroke:#2d91ff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  </style>
</head>
<body>
<div class="frame">

  <!-- HEADER -->
  <div class="header">
    <a class="header-back" href="settlement.html">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <span class="header-title">내 통장에 쏙</span>
    <span class="header-memo">메모 입력</span>
  </div>

  <!-- DATE NAV -->
  <div class="date-nav">
    <div class="date-arrow">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <div class="date-box">
      <span>5월 6일</span>
      <svg viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
    </div>
    <div class="date-arrow" style="transform:rotate(180deg);">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
  </div>

  <!-- 카드 1: 입금 상세 + 캘린더 (expanded) -->
  <div class="card">
    <p class="today-label">Today</p>
    <p class="today-title">오늘 5월 6일 입금 상세</p>

    <div class="amount-row">
      <span class="amount-label">카드 매출액</span>
      <span class="amount-value">2,903,930원</span>
    </div>
    <div class="amount-row">
      <span class="amount-label">차감 수수료</span>
      <span class="amount-value">-9,430원</span>
    </div>

    <div class="divider"></div>

    <div class="total-row">
      <span class="total-label">실제 입금액</span>
      <span class="total-value">2,894,500원</span>
    </div>

    <!-- 입금 캘린더 (expanded, up chevron) -->
    <div class="cal-header-btn">
      입금 캘린더
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>

    <!-- Legend -->
    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:#2d91ff;"></div>
        카드 매출액
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#22c55e;"></div>
        실제 통장 입금액
      </div>
    </div>

    <!-- Calendar -->
    <table class="cal-grid">
      <thead>
        <tr>
          <th>일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th>
        </tr>
      </thead>
      <tbody>
        <!-- Week 1: 1일=금, 2일=토 -->
        <tr>
          <td></td><td></td><td></td><td></td><td></td>
          <td>
            <div class="cal-date">1</div>
            <div class="cal-amt-blue">74만</div>
            <div class="cal-amt-green">94만</div>
          </td>
          <td>
            <div class="cal-date">2</div>
            <div class="cal-amt-blue">102만</div>
          </td>
        </tr>
        <!-- Week 2: 3~9 -->
        <tr>
          <td>
            <div class="cal-date">3</div>
            <div class="cal-amt-blue">79만</div>
            <div class="cal-amt-green">198만</div>
          </td>
          <td>
            <div class="cal-date">4</div>
            <div class="cal-amt-blue">82만</div>
            <div class="cal-amt-green">198만</div>
          </td>
          <td>
            <div class="cal-date">5</div>
            <div class="cal-amt-blue">68만</div>
            <div class="cal-amt-green">187만</div>
          </td>
          <td>
            <div class="cal-date today">6</div>
            <div class="cal-amt-blue">140만</div>
            <div class="cal-amt-green">289만</div>
          </td>
          <td><div class="cal-date">7</div></td>
          <td><div class="cal-date">8</div></td>
          <td><div class="cal-date">9</div></td>
        </tr>
        <!-- Week 3 -->
        <tr>
          <td><div class="cal-date">10</div></td>
          <td><div class="cal-date">11</div></td>
          <td><div class="cal-date">12</div></td>
          <td><div class="cal-date">13</div></td>
          <td><div class="cal-date">14</div></td>
          <td><div class="cal-date">15</div></td>
          <td><div class="cal-date">16</div></td>
        </tr>
        <!-- Week 4 -->
        <tr>
          <td><div class="cal-date">17</div></td>
          <td><div class="cal-date">18</div></td>
          <td><div class="cal-date">19</div></td>
          <td><div class="cal-date">20</div></td>
          <td><div class="cal-date">21</div></td>
          <td><div class="cal-date">22</div></td>
          <td><div class="cal-date">23</div></td>
        </tr>
        <!-- Week 5 -->
        <tr>
          <td><div class="cal-date">24</div></td>
          <td><div class="cal-date">25</div></td>
          <td><div class="cal-date">26</div></td>
          <td><div class="cal-date">27</div></td>
          <td><div class="cal-date">28</div></td>
          <td><div class="cal-date">29</div></td>
          <td><div class="cal-date">30</div></td>
        </tr>
        <!-- Week 6 -->
        <tr>
          <td><div class="cal-date">31</div></td>
          <td></td><td></td><td></td><td></td><td></td><td></td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- 카드 2: 입금 건별 내역 -->
  <div class="card">
    <div class="card2-header">
      <span class="card2-title">입금 건별 내역</span>
      <span class="card2-count">총 72건</span>
    </div>
    <a href="payment3.html" class="expand-link">
      펼쳐보기
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </a>
  </div>

</div>
</body>
</html>
