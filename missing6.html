<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미입금액 확인</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#eef2f6; display:flex; justify-content:center; min-height:100vh; font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif; }
    .frame { width:clamp(360px,100%,440px); background:#eef2f6; min-height:100vh; }

    .header { background:white; display:flex; align-items:center; padding:14px 20px; }
    .back-btn { background:none; border:none; cursor:pointer; padding:0; display:flex; align-items:center; }
    .header-title { flex:1; text-align:center; font-size:18px; font-weight:700; color:#2d91ff; letter-spacing:-0.3px; }

    .month-nav { background:white; display:flex; align-items:center; justify-content:center; gap:14px; padding:10px 20px 14px; }
    .month-btn { background:none; border:none; cursor:pointer; display:flex; align-items:center; color:#aab2bd; font-size:16px; }
    .month-text { font-size:14px; font-weight:500; color:#3e486b; }

    .steps-wrap { background:white; padding:12px 20px 16px; border-bottom:1px solid #e8edf2; }
    .steps { display:flex; align-items:center; justify-content:center; gap:0; }
    .step { display:flex; flex-direction:column; align-items:center; gap:6px; }
    .step-dot { width:9px; height:9px; border-radius:50%; background:#dde3ea; flex-shrink:0; }
    .step-dot.done { background:#2d91ff; }
    .step-dot.active { width:13px; height:13px; background:#2d91ff; }
    .step-label { font-size:10px; color:#c0c8d4; white-space:nowrap; letter-spacing:-0.2px; }
    .step-label.done { color:#2d91ff; }
    .step-label.active { color:#2d91ff; font-weight:700; }
    .step-line { width:32px; height:2px; background:#dde3ea; margin-bottom:16px; flex-shrink:0; }
    .step-line.done { background:#2d91ff; }

    .content { padding:16px; display:flex; flex-direction:column; align-items:center; gap:14px; padding-top:24px; }

    .jeonsan-card { background:white; border-radius:20px; padding:16px 18px; width:100%; box-shadow:0 1px 4px rgba(0,0,0,0.05); }
    .jeonsan-tag { background:#2d91ff; color:white; font-size:11px; font-weight:700; border-radius:20px; padding:3px 12px; display:inline-block; margin-bottom:10px; }
    .jeonsan-title { font-size:14px; font-weight:600; color:#3e486b; margin-bottom:12px; text-align:center; }
    .btn-jeonsan { background:white; border:1.5px solid #dde3ea; border-radius:12px; padding:12px; width:100%; font-size:14px; font-weight:600; color:#3e486b; font-family:inherit; cursor:pointer; text-align:center; }
  </style>
</head>
<body>
<div class="frame">

  <div class="header">
    <button class="back-btn" onclick="history.back()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#3e486b"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    </button>
    <div class="header-title">미입금액 확인</div>
    <div style="width:22px;"></div>
  </div>
  <div class="month-nav">
    <button class="month-btn">&#8249;</button>
    <div class="month-text">26년 5월</div>
    <button class="month-btn">&#8250;</button>
  </div>
  <div class="steps-wrap">
    <div class="steps">
      <div class="step"><div class="step-dot done"></div><div class="step-label done">탐색시작</div></div>
      <div class="step-line done"></div>
      <div class="step"><div class="step-dot done"></div><div class="step-label done">이상발견!</div></div>
      <div class="step-line done"></div>
      <div class="step"><div class="step-dot active"></div><div class="step-label active">신고접수</div></div>
      <div class="step-line"></div>
      <div class="step"><div class="step-dot"></div><div class="step-label">입금완료</div></div>
    </div>
  </div>

  <div class="content">
    <div style="width:48px;height:48px;background:#e8f0ff;border-radius:50%;display:flex;align-items:center;justify-content:center;">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="#2d91ff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
    </div>
    <div style="background:white;border-radius:20px;padding:22px 20px;width:100%;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.05);">
      <div style="font-size:16px;font-weight:700;color:#1a1a1a;line-height:1.6;margin-bottom:10px;">내일 다시 확인해드릴게요!</div>
      <div style="font-size:13px;color:#728094;line-height:1.8;">캐시노트가 계속 입금 현황을 모니터링하고<br>변동사항이 생기면 바로 알려드릴게요</div>
    </div>
    <div style="background:#e8f0ff;border-radius:14px;padding:14px 16px;width:100%;">
      <div style="font-size:13px;color:#2d91ff;font-weight:600;text-align:center;line-height:1.7;">캐시노트가 끝까지 추적할테니 안심하세요!</div>
    </div>
    <div class="jeonsan-card">
      <div class="jeonsan-tag">기다리기 힘들다면?</div>
      <div class="jeonsan-title">캐시노트가 먼저 입금해드릴까요?</div>
      <button class="btn-jeonsan" onclick="location.href='jeonsan1.html'">선정산 신청하기</button>
    </div>
  </div>

</div>
</body>
</html>
