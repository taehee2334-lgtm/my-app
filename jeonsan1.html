<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>선정산 신청하기</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#fff; display:flex; justify-content:center; min-height:100vh; font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif; }
    .frame { width:clamp(360px,100%,440px); background:#fff; min-height:100vh; display:flex; flex-direction:column; }

    .header { display:flex; align-items:center; padding:14px 20px; }
    .back-btn { background:none; border:none; cursor:pointer; padding:0; display:flex; align-items:center; }
    .header-title { flex:1; text-align:center; font-size:18px; font-weight:700; color:#2d91ff; letter-spacing:-0.3px; }

    .content { padding:20px 16px 32px; display:flex; flex-direction:column; gap:0; flex:1; }

    .main-card { background:white; border-radius:20px; box-shadow:0 2px 12px rgba(0,0,0,0.08); padding:22px 20px 24px; width:100%; }
    .card-label { font-size:14px; font-weight:600; color:#2d91ff; margin-bottom:4px; }
    .card-title { font-size:20px; font-weight:800; color:#1a1a1a; margin-bottom:16px; letter-spacing:-0.3px; }

    .inner-blue { background:#deeeff; border-radius:14px; padding:18px 16px 0; overflow:hidden; }
    .inner-title { font-size:17px; font-weight:800; color:#1a1a1a; line-height:1.4; margin-bottom:6px; }
    .inner-desc { font-size:13px; color:#3e486b; line-height:1.6; margin-bottom:14px; }
    .inner-img { display:block; width:180px; margin:0 auto; }

    .amount-section { padding:20px 4px 0; }
    .amount-text { font-size:18px; font-weight:700; color:#1a1a1a; line-height:1.5; letter-spacing:-0.3px; }
    .amount-text span { color:#2d91ff; }

    .account-section { margin-top:18px; }
    .account-header { display:flex; align-items:center; justify-content:space-between; padding-bottom:10px; border-bottom:1px solid #eef2f6; }
    .account-label { font-size:14px; font-weight:600; color:#1a1a1a; }
    .edit-btn { font-size:13px; color:#728094; border:1px solid #dde3ea; border-radius:8px; padding:5px 12px; background:white; cursor:pointer; font-family:inherit; }

    .account-row { display:flex; justify-content:space-between; align-items:center; padding:11px 0; border-bottom:1px solid #eef2f6; }
    .account-row:last-child { border-bottom:none; }
    .acc-key { font-size:13px; color:#aab2bd; }
    .acc-val { font-size:13px; font-weight:600; color:#1a1a1a; }

    .btn-primary { background:#2d91ff; color:white; border:none; border-radius:50px; padding:17px 18px; width:100%; font-size:16px; font-weight:700; font-family:inherit; cursor:pointer; text-align:center; display:block; text-decoration:none; margin-top:24px; }
  </style>
</head>
<body>
<div class="frame">

  <div class="header">
    <button class="back-btn" onclick="history.back()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="header-title">선정산 신청하기</div>
    <div style="width:22px;"></div>
  </div>

  <div class="content">
    <div class="main-card">
      <div class="card-label">카드 정산일 기다리지 말고</div>
      <div class="card-title">바로 입금 받아요</div>
      <div class="inner-blue">
        <div class="inner-title">월세 내는 날<br>현금이 부족해도</div>
        <div class="inner-desc">내일 모레 입금될 카드 매출액으로<br>밀리지 않게 월세 입금해요</div>
        <img class="inner-img" src="선정산.png" alt="선정산 이미지">
      </div>
    </div>

    <div class="amount-section">
      <div class="amount-text">카드 매출 <span>997,800원</span>이<br>바로 입금됩니다</div>
    </div>

    <div class="account-section">
      <div class="account-header">
        <div class="account-label">입금 받을 계좌</div>
        <button class="edit-btn">수정하기</button>
      </div>
      <div class="account-row">
        <div class="acc-key">예금주</div>
        <div class="acc-val">김시장</div>
      </div>
      <div class="account-row">
        <div class="acc-key">은행</div>
        <div class="acc-val">하나은행</div>
      </div>
      <div class="account-row">
        <div class="acc-key">계좌번호</div>
        <div class="acc-val">110-000-1092112</div>
      </div>
    </div>

    <a href="jeonsan2.html" class="btn-primary">바로 입금 신청</a>
  </div>

</div>
</body>
</html>
