<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>선정산 신청</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#eef2f6; display:flex; justify-content:center; min-height:100vh; font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif; }
    .frame { width:clamp(360px,100%,440px); background:#eef2f6; min-height:100vh; }

    .header { background:white; display:flex; align-items:center; padding:14px 20px; }
    .back-btn { background:none; border:none; cursor:pointer; padding:0; display:flex; align-items:center; }
    .header-title { flex:1; text-align:center; font-size:18px; font-weight:700; color:#2d91ff; letter-spacing:-0.3px; }

    .content { padding:16px; display:flex; flex-direction:column; align-items:center; gap:14px; padding-top:24px; }

    .btn-primary { background:#2d91ff; color:white; border:none; border-radius:14px; padding:16px 18px; width:100%; font-size:16px; font-weight:700; font-family:inherit; cursor:pointer; text-align:center; display:block; text-decoration:none; }
    .btn-outline { background:white; color:#3e486b; border:1.5px solid #dde3ea; border-radius:14px; padding:15px 18px; width:100%; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; text-align:center; display:block; text-decoration:none; }
  </style>
</head>
<body>
<div class="frame">

  <div class="header">
    <button class="back-btn" onclick="history.back()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#3e486b"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    </button>
    <div class="header-title">선정산 신청</div>
    <div style="width:22px;"></div>
  </div>

  <div class="content">
    <div style="width:56px;height:56px;background:#e8f0ff;border-radius:50%;display:flex;align-items:center;justify-content:center;">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="#2d91ff"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
    </div>

    <div style="background:white;border-radius:20px;padding:22px 20px;width:100%;box-shadow:0 1px 4px rgba(0,0,0,0.05);">
      <div style="font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:16px;text-align:center;">선정산 신청 내역</div>
      <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f4f7;">
        <div style="font-size:13px;color:#aab2bd;">신청 금액</div>
        <div style="font-size:13px;font-weight:700;color:#2d91ff;">120,000원</div>
      </div>
      <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f4f7;">
        <div style="font-size:13px;color:#aab2bd;">수수료</div>
        <div style="font-size:13px;font-weight:600;color:#1a1a1a;">1,200원 (1%)</div>
      </div>
      <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f4f7;">
        <div style="font-size:13px;color:#aab2bd;">실 수령액</div>
        <div style="font-size:13px;font-weight:700;color:#1a1a1a;">118,800원</div>
      </div>
      <div style="display:flex;justify-content:space-between;padding:10px 0;">
        <div style="font-size:13px;color:#aab2bd;">입금 예정</div>
        <div style="font-size:13px;font-weight:600;color:#1a1a1a;">신청 후 10분 이내</div>
      </div>
    </div>

    <div style="background:#fff8e6;border:1.5px solid #FFB800;border-radius:14px;padding:14px 16px;width:100%;">
      <div style="font-size:13px;color:#3e486b;line-height:1.7;text-align:center;">카드 매출 미입금액을 캐시노트가<br>먼저 입금해드려요<br><span style="color:#FFB800;font-weight:700;">카드사 입금 후 자동 정산</span>됩니다</div>
    </div>

    <div style="width:100%;display:flex;flex-direction:column;gap:10px;">
      <a href="jeonsan2.html" class="btn-primary">바로 입금 신청</a>
      <button class="btn-outline" onclick="history.back()">다음에 할게요</button>
    </div>
  </div>

</div>
</body>
</html>
