<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>배달 매출</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#e0e0e0;
      display:flex; justify-content:center;
      padding:20px 0;
      font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
    }
    .frame {
      width:clamp(360px,100%,440px);
      background:#f4f7f9;
      min-height:100vh;
      display:flex; flex-direction:column;
    }

    /* HEADER */
    .header {
      position:sticky; top:0; z-index:100;
      background:#fff; height:58px;
      display:flex; align-items:center;
      border-bottom:1px solid #e8edf2;
      padding:0 16px; flex-shrink:0;
    }
    .header-back { width:40px; display:flex; align-items:center; }
    .header-title { flex:1; text-align:center; font-size:18px; font-weight:700; color:#000; }
    .header-memo { width:60px; text-align:right; font-size:14px; color:#728094; }

    /* DATE NAV */
    .date-nav {
      display:flex; align-items:center; justify-content:center; gap:8px;
      padding:12px 16px;
    }
    .date-box { background:#f4f7f9; border-radius:8px; padding:6px 16px; font-size:14px; color:#3e486b; }
    .date-arrow-btn {
      width:33px; height:33px; border-radius:50%; background:#f4f7f9;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; border:none;
    }

    /* CARD */
    .card { margin:0 16px 12px; background:#fff; border:1px solid #e8edf2; border-radius:20px; overflow:hidden; }

    /* SUMMARY CARD */
    .card-header { display:flex; align-items:center; gap:8px; padding:20px 20px 12px; }
    .card-icon { width:42px; height:42px; border-radius:10px; background:#e8f5ff; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .sub-box {
      margin:0 16px 20px; background:#f9fbfc; border-radius:14px;
      padding:16px 20px;
    }
    .sub-box-label { font-size:14px; color:#728094; margin-bottom:6px; }
    .sub-box-amt { font-size:22px; font-weight:700; color:#2d91ff; }

    /* DELIVERY APPS CARD */
    .delivery-header { display:flex; align-items:center; gap:8px; padding:20px 20px 0; }
    .delivery-icon { width:42px; height:42px; border-radius:10px; background:#ffe8e8; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .delivery-title { font-size:16px; font-weight:700; color:#000; }

    .app-list { padding:12px 0; }
    .app-row {
      display:flex; align-items:center; gap:12px;
      padding:14px 20px;
      border-bottom:1px solid #f0f4f8;
    }
    .app-row:last-child { border-bottom:none; }
    .app-logo {
      width:36px; height:36px; border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; font-size:10px; font-weight:700; color:#fff;
    }
    .app-name { flex:1; font-size:16px; font-weight:500; color:#000; }
    .app-amt { font-size:16px; font-weight:600; color:#000; }

    .bottom-pad { height:40px; }
  </style>
</head>
<body>
<div class="frame">

  <!-- HEADER -->
  <div class="header">
    <a href="sales1.html" class="header-back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#000"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </a>
    <div class="header-title">오늘 매출 얼마?</div>
    <div class="header-memo">메모 입력</div>
  </div>

  <!-- DATE NAV -->
  <div class="date-nav">
    <button class="date-arrow-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#728094"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    </button>
    <div class="date-box">26년 5월 6일</div>
    <button class="date-arrow-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#728094"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
    </button>
  </div>

  <!-- 실시간 매출 카드 (배달만) -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon" style="background:transparent;overflow:hidden;">
        <img src="매출.png" style="width:100%;height:100%;object-fit:cover;display:block;">
      </div>
      <span style="font-size:14px; font-weight:500; color:#3e486b;">오늘 5월 6일 실시간 매출</span>
    </div>
    <div class="sub-box">
      <div class="sub-box-label">배달 매출</div>
      <div class="sub-box-amt">491,500원</div>
    </div>
  </div>

  <!-- 배달앱 매출 카드 -->
  <div class="card">
    <div class="delivery-header">
      <div class="delivery-icon">
        <!-- 배달 아이콘 (H 모양) -->
        <svg viewBox="0 0 24 24" style="width:22px;height:22px;" fill="#E8003D">
          <path d="M19 7c0-1.1-.9-2-2-2h-3v2h3v2.65L13.52 14H10V9H6c-2.21 0-4 1.79-4 4v3h2c0 1.66 1.34 3 3 3s3-1.34 3-3h4.48L19 10.35V7zM7 17c-.55 0-1-.45-1-1h2c0 .55-.45 1-1 1z"/>
          <path d="M5 6h5V4H5zM19 14c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
        </svg>
      </div>
      <span class="delivery-title">배달앱 매출</span>
    </div>

    <div class="app-list">
      <!-- 배달의민족 -->
      <div class="app-row">
        <div class="app-logo" style="background:#21F200;">
          <svg viewBox="0 0 36 36" style="width:36px;height:36px; border-radius:10px;">
            <rect width="36" height="36" rx="10" fill="#21F200"/>
            <text x="18" y="24" text-anchor="middle" fill="#000" font-size="13" font-weight="800" font-family="Pretendard,sans-serif">B</text>
          </svg>
        </div>
        <span class="app-name">배달의민족</span>
        <span class="app-amt">98,000원</span>
      </div>

      <!-- 쿠팡이츠 -->
      <div class="app-row">
        <div class="app-logo" style="background:#C00029;">
          <svg viewBox="0 0 36 36" style="width:36px;height:36px; border-radius:10px;">
            <rect width="36" height="36" rx="10" fill="#C00029"/>
            <text x="18" y="14" text-anchor="middle" fill="#fff" font-size="7" font-weight="700" font-family="Pretendard,sans-serif">coupang</text>
            <text x="18" y="25" text-anchor="middle" fill="#fff" font-size="7" font-weight="700" font-family="Pretendard,sans-serif">eats</text>
          </svg>
        </div>
        <span class="app-name">쿠팡이츠</span>
        <span class="app-amt">324,000원</span>
      </div>

      <!-- 요기요 -->
      <div class="app-row">
        <div class="app-logo" style="background:#EE1832;">
          <svg viewBox="0 0 36 36" style="width:36px;height:36px; border-radius:10px;">
            <rect width="36" height="36" rx="10" fill="#EE1832"/>
            <text x="18" y="24" text-anchor="middle" fill="#fff" font-size="11" font-weight="800" font-family="Pretendard,sans-serif">Y</text>
          </svg>
        </div>
        <span class="app-name">요기요</span>
        <span class="app-amt">49,500원</span>
      </div>

      <!-- 땡겨요 -->
      <div class="app-row">
        <div class="app-logo" style="background:#FF5C00;">
          <svg viewBox="0 0 36 36" style="width:36px;height:36px; border-radius:10px;">
            <rect width="36" height="36" rx="10" fill="#FF5C00"/>
            <text x="18" y="24" text-anchor="middle" fill="#fff" font-size="11" font-weight="800" font-family="Pretendard,sans-serif">땡</text>
          </svg>
        </div>
        <span class="app-name">땡겨요</span>
        <span class="app-amt">20,000원</span>
      </div>
    </div>
  </div>

  <div class="bottom-pad"></div>
</div>
</body>
</html>
