<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미입금액 확인</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#eef2f6; display:flex; justify-content:center; min-height:100vh; font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif; }
    .frame { width:clamp(360px,100%,440px); background:#eef2f6; min-height:100vh; }

    .header { background:white; display:flex; align-items:center; padding:14px 20px; }
    .back-btn { background:none; border:none; cursor:pointer; padding:0; display:flex; align-items:center; }
    .header-title { flex:1; text-align:center; font-size:18px; font-weight:700; color:#2d91ff; letter-spacing:-0.3px; }

    .month-nav { background:white; display:flex; align-items:center; justify-content:center; gap:14px; padding:10px 20px 14px; }
    .month-btn { background:none; border:none; cursor:pointer; display:flex; align-items:center; color:#aab2bd; font-size:16px; }
    .month-text { font-size:14px; font-weight:500; color:#3e486b; }

    .steps-wrap { background:white; padding:12px 20px 16px; border-bottom:1px solid #e8edf2; }
    .steps { display:flex; align-items:center; justify-content:center; gap:0; }
    .step { display:flex; flex-direction:column; align-items:center; gap:6px; }
    .step-dot { width:9px; height:9px; border-radius:50%; background:#dde3ea; flex-shrink:0; }
    .step-dot.done { background:#2d91ff; }
    .step-dot.active { width:13px; height:13px; background:#2d91ff; }
    .step-label { font-size:10px; color:#c0c8d4; white-space:nowrap; letter-spacing:-0.2px; }
    .step-label.done { color:#2d91ff; }
    .step-label.active { color:#2d91ff; font-weight:700; }
    .step-line { width:32px; height:2px; background:#dde3ea; margin-bottom:16px; flex-shrink:0; }
    .step-line.done { background:#2d91ff; }

    .content { padding:24px 16px 32px; display:flex; flex-direction:column; align-items:center; gap:16px; }
  </style>
</head>
<body>
<div class="frame">

  <div class="header">
    <button class="back-btn" onclick="history.back()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="header-title">미입금액 확인</div>
    <div style="width:22px;"></div>
  </div>

  <div class="month-nav">
    <button class="month-btn">&#8249;</button>
    <div class="month-text">26년 5월</div>
    <button class="month-btn">&#8250;</button>
  </div>

  <div class="steps-wrap">
    <div class="steps">
      <div class="step"><div class="step-dot done"></div><div class="step-label done">탐색시작</div></div>
      <div class="step-line done"></div>
      <div class="step"><div class="step-dot done"></div><div class="step-label done">이상발견!</div></div>
      <div class="step-line done"></div>
      <div class="step"><div class="step-dot done"></div><div class="step-label done">신고접수</div></div>
      <div class="step-line done"></div>
      <div class="step"><div class="step-dot active"></div><div class="step-label active">입금완료</div></div>
    </div>
  </div>

  <div class="content">
    <div style="width:50px;height:50px;background:#22c55e;border-radius:50%;display:flex;align-items:center;justify-content:center;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
    </div>

    <div style="background:white;border-radius:16px;padding:28px 20px;width:100%;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);">
      <div style="font-size:16px;color:#1a1a1a;line-height:1.7;">지금 바로<br><span style="font-weight:800;">국민카드 1건(50,000원)</span>의<br>입금이 완료되었어요</div>
    </div>

    <div style="font-size:13px;color:#aab2bd;text-align:center;line-height:1.7;padding-top:4px;">하지만 같은 카드사에서 같은 오류가 반복된다면<br>확인이 필요해요</div>
  </div>

</div>
</body>
</html>
