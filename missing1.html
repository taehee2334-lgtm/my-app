<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미입금액 확인</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#e0e0e0; display:flex; justify-content:center; min-height:100vh; font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif; }
    .frame { width:clamp(360px,100%,440px); background:#f4f7f9; min-height:100vh; }

    .header { background:white; display:flex; align-items:center; padding:14px 16px; border-bottom:1px solid #e8edf2; position:sticky; top:0; z-index:10; }
    .back-btn { background:none; border:none; cursor:pointer; padding:4px; display:flex; align-items:center; }
    .header-title { flex:1; text-align:center; font-size:17px; font-weight:600; color:#1a1a1a; }
    .header-spacer { width:32px; }

    .month-nav { background:white; display:flex; align-items:center; justify-content:center; gap:12px; padding:10px 16px; border-bottom:1px solid #e8edf2; }
    .month-btn { background:none; border:none; cursor:pointer; display:flex; align-items:center; }
    .month-pill { font-size:14px; font-weight:500; color:#3e486b; background:#f0f4f7; border-radius:20px; padding:5px 18px; }

    .steps { display:flex; align-items:flex-start; justify-content:center; padding:14px 16px 10px; background:white; border-bottom:1px solid #e8edf2; }
    .step { display:flex; flex-direction:column; align-items:center; gap:5px; }
    .step-dot { width:10px; height:10px; border-radius:50%; background:#dde3ea; }
    .step-dot.done { background:#2d91ff; }
    .step-dot.active { width:14px; height:14px; background:#2d91ff; }
    .step-label { font-size:10px; color:#aab2bd; white-space:nowrap; }
    .step-label.done { color:#2d91ff; }
    .step-label.active { color:#2d91ff; font-weight:700; }
    .step-line { width:36px; height:2px; background:#dde3ea; margin-top:6px; }
    .step-line.done { background:#2d91ff; }

    .content { padding:14px; display:flex; flex-direction:column; gap:12px; }

    .scan-card { background:white; border-radius:16px; padding:16px; display:flex; align-items:center; gap:10px; }
    .scan-card svg { flex-shrink:0; }
    .scan-text { font-size:14px; color:#3e486b; font-weight:500; }

    .check-circle { display:flex; justify-content:center; padding:12px 0; }

    .ok-card { background:#fff9e6; border-radius:16px; padding:16px; display:flex; align-items:center; gap:10px; }
    .ok-text { font-size:15px; font-weight:700; color:#3e486b; }

    .history-section { background:white; border-radius:16px; overflow:hidden; }
    .history-title { font-size:13px; font-weight:600; color:#728094; padding:12px 16px; text-align:center; background:#f8fafc; border-bottom:1px solid #f0f4f7; }
    .history-table { width:100%; border-collapse:collapse; }
    .history-table th { font-size:12px; color:#a0aab6; font-weight:500; padding:10px 12px; border-bottom:1px solid #f0f4f7; text-align:center; }
    .history-table td { font-size:13px; color:#3e486b; padding:12px 12px; border-bottom:1px solid #f0f4f7; text-align:center; }
    .history-table td:first-child { text-align:left; font-weight:500; }
    .td-blue { color:#2d91ff; font-weight:600; }
    .history-more { text-align:center; padding:14px; font-size:13px; color:#a0aab6; cursor:pointer; }
  </style>
</head>
<body>
<div class="frame">
  <!-- Header -->
  <div class="header">
    <button class="back-btn" onclick="history.back()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#3e486b"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    </button>
    <div class="header-title">미입금액 확인</div>
    <div class="header-spacer"></div>
  </div>

  <!-- Month Nav -->
  <div class="month-nav">
    <button class="month-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#728094"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    </button>
    <div class="month-pill">26년 5월</div>
    <button class="month-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#728094"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
    </button>
  </div>

  <!-- Step Indicator -->
  <div class="steps">
    <div class="step">
      <div class="step-dot done"></div>
      <div class="step-label done">탐색시작</div>
    </div>
    <div class="step-line done"></div>
    <div class="step">
      <div class="step-dot active"></div>
      <div class="step-label active">이상없음!</div>
    </div>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- 스캔 중 카드 -->
    <div class="scan-card">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#728094"><path d="M9.5 14.5L3 21v-4H1v-4h2v-2l1.5-1.5L9.5 14.5zM22 3H2v2h20V3zM2 19h20v2H2v-2zM22 7H2v2h20V7zm0 4H2v2h20v-2z"/></svg>
      <div class="scan-text">입금현황에 이상이 없는지 확인하고 있어요!</div>
    </div>

    <!-- 체크 아이콘 -->
    <div class="check-circle">
      <div style="width:56px;height:56px;background:#22c55e;border-radius:50%;display:flex;align-items:center;justify-content:center;">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      </div>
    </div>

    <!-- 안심 카드 -->
    <div class="ok-card">
      <span style="font-size:22px;">👋</span>
      <div class="ok-text">안심하세요! 누락건이 하나도 없어요</div>
    </div>

    <!-- 과거 이력 -->
    <div class="history-section">
      <div class="history-title">과거 이력</div>
      <table class="history-table">
        <thead>
          <tr>
            <th>연월</th>
            <th>입금 누락</th>
            <th>매입 취소</th>
            <th>상태</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>2026년 5월</td>
            <td>없음</td>
            <td>없음</td>
            <td class="td-blue">정상</td>
          </tr>
          <tr>
            <td>2026년 4월</td>
            <td>없음</td>
            <td>없음</td>
            <td class="td-blue">정상</td>
          </tr>
          <tr>
            <td>2026년 3월</td>
            <td>없음</td>
            <td>없음</td>
            <td class="td-blue">정상</td>
          </tr>
          <tr>
            <td>2026년 2월</td>
            <td>없음</td>
            <td>없음</td>
            <td class="td-blue">정상</td>
          </tr>
          <tr>
            <td>2026년 1월</td>
            <td>없음</td>
            <td>없음</td>
            <td class="td-blue">정상</td>
          </tr>
        </tbody>
      </table>
      <div class="history-more">내역 더 불러오기</div>
    </div>

  </div>
</div>
</body>
</html>
