<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미입금액 확인</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <style>

    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#eef2f6; display:flex; justify-content:center; min-height:100vh; font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif; }
    .frame { width:clamp(360px,100%,440px); background:#eef2f6; min-height:100vh; }

    /* Header */
    .header { background:white; display:flex; align-items:center; padding:14px 20px; }
    .back-btn { background:none; border:none; cursor:pointer; padding:0; display:flex; align-items:center; }
    .header-title { flex:1; text-align:center; font-size:18px; font-weight:700; color:#2d91ff; letter-spacing:-0.3px; }

    /* Month nav */
    .month-nav { background:white; display:flex; align-items:center; justify-content:center; gap:14px; padding:10px 20px 14px; }
    .month-btn { background:none; border:none; cursor:pointer; display:flex; align-items:center; color:#aab2bd; font-size:16px; }
    .month-text { font-size:14px; font-weight:500; color:#3e486b; }

    /* Step indicator */
    .steps-wrap { background:white; padding:12px 20px 16px; border-bottom:1px solid #e8edf2; }
    .steps { display:flex; align-items:center; justify-content:center; gap:0; }
    .step { display:flex; flex-direction:column; align-items:center; gap:6px; }
    .step-dot { width:10px; height:10px; border-radius:50%; background:#dde3ea; flex-shrink:0; }
    .step-dot.done { background:#2d91ff; }
    .step-dot.active { width:10px; height:10px; background:#2d91ff; box-shadow:0 0 0 3px white, 0 0 0 5px #2d91ff; }
    .step-dot.green { width:10px; height:10px; background:#22c55e; box-shadow:0 0 0 3px white, 0 0 0 5px #22c55e; }
    .step-label { font-size:10px; color:#c0c8d4; white-space:nowrap; letter-spacing:-0.2px; }
    .step-label.done { color:#2d91ff; }
    .step-label.active { color:#2d91ff; font-weight:700; }
    .step-label.green { color:#22c55e; font-weight:700; }
    .step-line { width:32px; height:2px; background:#dde3ea; margin-bottom:16px; flex-shrink:0; }
    .step-line.done { background:#2d91ff; }

    /* Content area */
    .content { padding:20px; display:flex; flex-direction:column; align-items:center; gap:0; }

    /* Connector line between cards */
    .connector { width:2px; height:26px; background:#dde3ea; }

    /* Scan card */
    .scan-card { background:white; border-radius:24px; padding:18px 20px; display:flex; align-items:center; justify-content:center; gap:10px; width:100%; box-shadow:0 1px 4px rgba(0,0,0,0.05); }
    .scan-text { font-size:14px; color:#3e486b; font-weight:500; line-height:1.5; }

    /* Alert badge */
    .alert-badge { background:#FFC800; border-radius:20px; padding:14px 20px; display:flex; align-items:center; gap:10px; justify-content:center; width:100%; }
    .alert-badge-text { font-size:18px; font-weight:800; color:white; letter-spacing:-0.2px; }

    /* Detail card */
    .detail-card { background:white; border-radius:20px; padding:16px 20px; width:100%; box-shadow:0 1px 4px rgba(0,0,0,0.05); }
    .detail-row { display:flex; padding:8px 0; border-bottom:1px solid #f0f4f7; align-items:center; }
    .detail-row:last-child { border-bottom:none; }
    .detail-label { font-size:13px; color:#aab2bd; width:88px; flex-shrink:0; text-align:right; padding-right:14px; }
    .detail-value { font-size:13px; color:#1a1a1a; font-weight:600; flex:1; }
    .late-badge { display:flex; align-items:center; gap:3px; font-size:12px; color:#ff6b35; font-weight:700; margin-left:6px; white-space:nowrap; }

    /* Status text */
    .status-text { font-size:13px; color:#2d91ff; font-weight:600; text-align:center; padding:10px 0 2px; }

    /* Reason box */
    .reason-box { border:1.5px solid #FFC800; border-radius:24px; padding:22px 24px; width:100%; background:white; margin-top:14px; }
    .reason-text { font-size:16px; color:#2d91ff; font-weight:600; text-align:center; }

    /* Button area */
    .btn-area { width:100%; margin-top:14px; display:flex; flex-direction:column; gap:0; }
    .btn-row { position:relative; }
    .btn-hint { font-size:11px; color:#c0c8d4; text-align:right; padding:4px 2px; }
    .btn-primary { background:#2d91ff; color:white; border:none; border-radius:14px; padding:15px 18px; width:100%; font-size:15px; font-weight:700; font-family:inherit; cursor:pointer; text-align:center; display:block; text-decoration:none; }
    .btn-outline { background:white; color:#3e486b; border:1.5px solid #dde3ea; border-radius:14px; padding:14px 18px; width:100%; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; text-align:center; display:block; text-decoration:none; margin-top:10px; }
    .btn-green { background:#22c55e; color:white; border:none; border-radius:14px; padding:15px 18px; width:100%; font-size:15px; font-weight:700; font-family:inherit; cursor:pointer; text-align:center; display:block; text-decoration:none; }
    .btn-call { background:#2d91ff; color:white; border:none; border-radius:14px; padding:15px 18px; width:100%; font-size:15px; font-weight:700; font-family:inherit; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; }

    /* Jeonsan card */
    .jeonsan-card { background:white; border-radius:20px; padding:16px 18px; width:100%; margin-top:14px; box-shadow:0 1px 4px rgba(0,0,0,0.05); }
    .jeonsan-tag { background:#2d91ff; color:white; font-size:11px; font-weight:700; border-radius:20px; padding:3px 12px; display:inline-block; margin-bottom:10px; }
    .jeonsan-title { font-size:14px; font-weight:600; color:#3e486b; margin-bottom:12px; }
    .btn-jeonsan { background:white; border:1.5px solid #dde3ea; border-radius:12px; padding:12px; width:100%; font-size:14px; font-weight:600; color:#3e486b; font-family:inherit; cursor:pointer; text-align:center; }



    /* ── Slide-in animation ── */
    @keyframes slideDown {
      from { opacity:0; transform:translateY(-20px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .anim { opacity:0; animation:slideDown 0.45s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
    .d0 { animation-delay:0s; }
    .d1 { animation-delay:0.9s; }
    .d2 { animation-delay:1.8s; }
    .d3 { animation-delay:2.7s; }
    .d4 { animation-delay:3.6s; }
    .d5 { animation-delay:4.5s; }
  </style>
</head>
<body>
<div class="frame">

  <div class="header">
    <button class="back-btn" onclick="history.back()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#3e486b"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    </button>
    <div class="header-title">미입금액 확인</div>
    <div style="width:22px;"></div>
  </div>
  <div class="month-nav">
    <button class="month-btn">&#8249;</button>
    <div class="month-text">26년 5월</div>
    <button class="month-btn">&#8250;</button>
  </div>
  <div class="steps-wrap">
    <div class="steps">
      <div class="step"><div class="step-dot done"></div><div class="step-label done">탐색시작</div></div>
      <div class="step-line done"></div>
      <div class="step"><div class="step-dot green"></div><div class="step-label green">이상없음!</div></div>
    </div>
  </div>
  <div class="content">
    <div class="scan-card anim d0" style="margin-bottom:0;">
      <span style="font-size:20px;">🔍</span>
      <div class="scan-text">입금현황에 이상이 없는지 확인하고 있어요!</div>
    </div>
    <div class="connector anim d1"></div>
    <div class="anim d1" style="width:48px;height:48px;background:#22c55e;border-radius:50%;display:flex;align-items:center;justify-content:center;">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
    </div>
    <div class="connector anim d2"></div>
    <div class="anim d2" style="background:white;border-radius:24px;padding:20px 22px;display:flex;align-items:center;gap:14px;justify-content:center;width:100%;box-shadow:0 1px 4px rgba(0,0,0,0.05);border:1.5px solid #deeeff;">
      <span style="font-size:24px;">👋</span>
      <div style="display:flex;flex-direction:column;gap:3px;">
        <span style="font-size:17px;font-weight:800;color:#2d91ff;">안심하세요!</span>
        <span style="font-size:15px;font-weight:600;color:#1a1a1a;">누락건이 하나도 없어요</span>
      </div>
    </div>
    <div class="anim d3" style="width:100%;background:white;border-radius:24px;margin-top:20px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.05);">
      <div style="background:#f8fafc;padding:12px 20px;font-size:13px;font-weight:600;color:#728094;text-align:center;border-bottom:1px solid #f0f4f7;">과거 이력</div>
      <table style="width:100%;border-collapse:collapse;">
        <thead>
          <tr>
            <th style="font-size:12px;color:#a0aab6;font-weight:500;padding:10px 12px 8px;text-align:left;border-bottom:1px solid #f0f4f7;">연월</th>
            <th style="font-size:12px;color:#a0aab6;font-weight:500;padding:10px 6px 8px;text-align:center;border-bottom:1px solid #f0f4f7;">입금 누락</th>
            <th style="font-size:12px;color:#a0aab6;font-weight:500;padding:10px 6px 8px;text-align:center;border-bottom:1px solid #f0f4f7;">매입 취소</th>
            <th style="font-size:12px;color:#a0aab6;font-weight:500;padding:10px 12px 8px;text-align:center;border-bottom:1px solid #f0f4f7;">상태</th>
          </tr>
        </thead>
        <tbody>
          <tr><td style="font-size:13px;color:#3e486b;font-weight:500;padding:12px 12px;border-bottom:1px solid #f8fafc;">2026년 5월</td><td style="font-size:13px;color:#a0aab6;text-align:center;border-bottom:1px solid #f8fafc;">없음</td><td style="font-size:13px;color:#a0aab6;text-align:center;border-bottom:1px solid #f8fafc;">없음</td><td style="font-size:13px;color:#2d91ff;font-weight:700;text-align:center;border-bottom:1px solid #f8fafc;">정상</td></tr><tr><td style="font-size:13px;color:#3e486b;font-weight:500;padding:12px 12px;border-bottom:1px solid #f8fafc;">2026년 4월</td><td style="font-size:13px;color:#a0aab6;text-align:center;border-bottom:1px solid #f8fafc;">없음</td><td style="font-size:13px;color:#a0aab6;text-align:center;border-bottom:1px solid #f8fafc;">없음</td><td style="font-size:13px;color:#2d91ff;font-weight:700;text-align:center;border-bottom:1px solid #f8fafc;">정상</td></tr><tr><td style="font-size:13px;color:#3e486b;font-weight:500;padding:12px 12px;border-bottom:1px solid #f8fafc;">2026년 3월</td><td style="font-size:13px;color:#a0aab6;text-align:center;border-bottom:1px solid #f8fafc;">없음</td><td style="font-size:13px;color:#a0aab6;text-align:center;border-bottom:1px solid #f8fafc;">없음</td><td style="font-size:13px;color:#2d91ff;font-weight:700;text-align:center;border-bottom:1px solid #f8fafc;">정상</td></tr><tr><td style="font-size:13px;color:#3e486b;font-weight:500;padding:12px 12px;border-bottom:1px solid #f8fafc;">2026년 2월</td><td style="font-size:13px;color:#a0aab6;text-align:center;border-bottom:1px solid #f8fafc;">없음</td><td style="font-size:13px;color:#a0aab6;text-align:center;border-bottom:1px solid #f8fafc;">없음</td><td style="font-size:13px;color:#2d91ff;font-weight:700;text-align:center;border-bottom:1px solid #f8fafc;">정상</td></tr><tr><td style="font-size:13px;color:#3e486b;font-weight:500;padding:12px 12px;border-bottom:1px solid #f8fafc;">2026년 1월</td><td style="font-size:13px;color:#a0aab6;text-align:center;border-bottom:1px solid #f8fafc;">없음</td><td style="font-size:13px;color:#a0aab6;text-align:center;border-bottom:1px solid #f8fafc;">없음</td><td style="font-size:13px;color:#2d91ff;font-weight:700;text-align:center;border-bottom:1px solid #f8fafc;">정상</td></tr>
        </tbody>
      </table>
      <div style="text-align:center;padding:14px;font-size:13px;color:#a0aab6;cursor:pointer;">내역 더 불러오기</div>
    </div>
  </div>

</div>
</body>
</html>
